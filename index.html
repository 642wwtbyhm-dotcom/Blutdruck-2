<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blutdruck Tracker Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2f3542;
            --bg: #f1f2f6;
            --card: #ffffff;
            --text: #2f3542;
            --accent: #5352ed;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 430px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 15px;
            color: var(--primary);
        }
        h2 {
            font-size: 18px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .input-wrapper {
            flex: 1;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            opacity: 0.7;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #fff;
            -webkit-appearance: none;
        }
        .edit-datetime-wrapper {
            margin-bottom: 12px;
            display: none;
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 71, 87, 0.2);
        }
        button:active { background-color: #e0404e; }

        .btn-cancel {
            background-color: #ced6e0;
            color: var(--text);
            margin-top: 8px;
            box-shadow: none;
        }
        
        .trend-box {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            padding: 10px;
            background: #eccc68;
            color: #2f3542;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .filter-btn {
            flex: 1;
            background-color: #ced6e0;
            color: var(--text);
            padding: 8px;
            font-size: 13px;
            box-shadow: none;
        }
        .filter-btn.active {
            background-color: var(--accent);
            color: white;
        }
        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
        }
        
        .verlauf-header {
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .btn-export { 
            background-color: var(--secondary); 
            margin-bottom: 15px; 
            box-shadow: none;
            font-size: 14px;
            padding: 10px;
        }
        .btn-export:active { background-color: #1e222b; }

        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .history-item:active {
            background-color: #e8e8e8;
        }
        .values { font-size: 17px; font-weight: bold; }
        .sub-info { font-size: 13px; color: #747d8c; margin-top: 2px; }
        .timestamp { font-size: 11px; color: #a4b0be; text-align: right; }
        .delete-btn {
            background: none; border: none; color: #ff6b81;
            font-size: 13px; cursor: pointer; padding: 5px 0 0 0;
            width: auto; box-shadow: none; text-align: right; display: block;
        }
        .edit-hint {
            font-size: 10px;
            color: var(--accent);
            text-align: right;
            margin-bottom: 3px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Blutdruck Tracker Pro</h1>
    
    <div id="trendDisplay" class="trend-box">Trend zur aktuellen Uhrzeit: Berechne...</div>

    <div class="card" id="formCard">
        <h3 id="formTitle" style="margin-top:0; margin-bottom:12px; font-size:16px;">Neue Messung</h3>
        
        <div class="input-wrapper edit-datetime-wrapper" id="dateTimeWrapper">
            <label for="editDateTime">Datum & Uhrzeit bearbeiten</label>
            <input type="datetime-local" id="editDateTime">
        </div>

        <div class="form-row">
            <div class="input-wrapper">
                <label for="sys">Sys</label>
                <input type="number" id="sys" placeholder="120" inputmode="numeric" oninput="checkLength(this, 3, 'dia')">
            </div>
            <div class="input-wrapper">
                <label for="dia">Dia</label>
                <input type="number" id="dia" placeholder="80" inputmode="numeric" oninput="checkLength(this, 2, 'pulse')">
            </div>
            <div class="input-wrapper">
                <label for="pulse">Puls</label>
                <input type="number" id="pulse" placeholder="70" inputmode="numeric" oninput="limitLength(this, 3)">
            </div>
            <div class="input-wrapper">
                <label for="pille">Pille</label>
                <input type="number" id="pille" placeholder="1" inputmode="numeric">
            </div>
        </div>
        
        <button id="btnSave" onclick="saveData()">Speichern</button>
        <button id="btnCancel" class="btn-cancel" style="display:none;" onclick="resetForm()">Abbrechen</button>
    </div>

    <h2>Diagramm</h2>
    <div class="card">
        <div class="filter-buttons">
            <button class="filter-btn active" id="btn-woche" onclick="changePeriod('woche')">Woche</button>
            <button class="filter-btn" id="btn-monat" onclick="changePeriod('monat')">Monat</button>
            <button class="filter-btn" id="btn-alles" onclick="changePeriod('alles')">Alles</button>
        </div>
        <div class="chart-container">
            <canvas id="bpChart"></canvas>
        </div>
    </div>

    <div class="verlauf-header">
        <h2>Verlauf</h2>
        <button class="btn-export" onclick="exportToCSV()">Daten als CSV exportieren</button>
    </div>
    
    <ul class="history-list" id="logList"></ul>
</div>

<script>
    let db;
    let currentPeriod = 'woche';
    let myChart = null;
    let editingId = null;

    function checkLength(element, maxLength, nextElementId) {
        if (element.value.length >= maxLength) {
            element.value = element.value.slice(0, maxLength); 
            const nextEl = document.getElementById(nextElementId);
            if (nextEl) nextEl.focus();
        }
    }

    function limitLength(element, maxLength) {
        if (element.value.length > maxLength) {
            element.value = element.value.slice(0, maxLength);
        }
    }

    const request = indexedDB.open("BlutdruckDBPro", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("messungen", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = (e) => {
        db = e.target.result;
        loadLastPilleValue();
        updateApp();
    };

    function loadLastPilleValue() {
        const lastPille = localStorage.getItem("lastPilleValue");
        if (lastPille !== null) {
            document.getElementById('pille').value = lastPille;
        } else {
            document.getElementById('pille').value = "1";
        }
    }

    function updateApp() {
        displayData();
        updateChart();
        calculateTrend();
    }

    function saveData() {
        const sys = document.getElementById('sys').value;
        const dia = document.getElementById('dia').value;
        const pulse = document.getElementById('pulse').value;
        const pille = document.getElementById('pille').value;

        if (!sys || !dia || !pulse) { alert("Bitte alle Felder ausfüllen!"); return; }

        if (pille !== "") {
            localStorage.setItem("lastPilleValue", pille);
        }

        const tx = db.transaction(["messungen"], "readwrite");
        const store = tx.objectStore("messungen");

        if (editingId !== null) {
            const dtInput = document.getElementById('editDateTime').value;
            const customDate = dtInput ? new Date(dtInput) : new Date();

            const updatedMessung = {
                id: editingId,
                sys: parseInt(sys), 
                dia: parseInt(dia), 
                pulse: parseInt(pulse), 
                pille: pille !== "" ? parseInt(pille) : 0,
                timestamp: customDate.toLocaleString('de-DE', { dateStyle: 'short', timeStyle: 'short' }),
                rawDate: customDate.getTime(),
                hour: customDate.getHours(),
                minute: customDate.getMinutes()
            };

            store.put(updatedMessung);
        } else {
            const jetzt = new Date();
            const neueMessung = {
                sys: parseInt(sys), 
                dia: parseInt(dia), 
                pulse: parseInt(pulse), 
                pille: pille !== "" ? parseInt(pille) : 0,
                timestamp: jetzt.toLocaleString('de-DE', { dateStyle: 'short', timeStyle: 'short' }),
                rawDate: jetzt.getTime(),
                hour: jetzt.getHours(),
                minute: jetzt.getMinutes()
            };

            store.add(neueMessung);
        }

        tx.oncomplete = () => {
            resetForm();
            updateApp();
        };
    }

    function editItem(id, event) {
        if (event.target.classList.contains('delete-btn')) return;

        const tx = db.transaction(["messungen"], "readonly");
        tx.objectStore("messungen").get(id).onsuccess = (e) => {
            const item = e.target.result;
            if (!item) return;

            editingId = id;
            document.getElementById('sys').value = item.sys;
            document.getElementById('dia').value = item.dia;
            document.getElementById('pulse').value = item.pulse;
            document.getElementById('pille').value = item.pille;

            const d = new Date(item.rawDate);
            const isoString = new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
            document.getElementById('editDateTime').value = isoString;

            document.getElementById('formTitle').innerText = "Messung bearbeiten";
            document.getElementById('btnSave').innerText = "Änderungen speichern";
            document.getElementById('dateTimeWrapper').style.display = "block";
            document.getElementById('btnCancel').style.display = "block";

            document.getElementById('formCard').scrollIntoView({ behavior: 'smooth' });
        };
    }

    function resetForm() {
        editingId = null;
        document.getElementById('sys').value = '';
        document.getElementById('dia').value = '';
        document.getElementById('pulse').value = '';
        
        loadLastPilleValue();

        document.getElementById('formTitle').innerText = "Neue Messung";
        document.getElementById('btnSave').innerText = "Speichern";
        document.getElementById('dateTimeWrapper').style.display = "none";
        document.getElementById('btnCancel').style.display = "none";
    }

    function displayData() {
        const logList = document.getElementById('logList');
        logList.innerHTML = "";
        const tx = db.transaction(["messungen"], "readonly");
        tx.objectStore("messungen").getAll().onsuccess = (e) => {
            const data = e.target.result.sort((a,b) => b.rawDate - a.rawDate);
            data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.onclick = (evt) => editItem(item.id, evt);
                li.innerHTML = `
                    <div>
                        <div class="values">${item.sys}/${item.dia}</div>
                        <div class="sub-info">❤️ ${item.pulse} bpm | 💊 Pille: ${item.pille}</div>
                    </div>
                    <div>
                        <div class="edit-hint">✏️ Tippen zum Bearbeiten</div>
                        <div class="timestamp">${item.timestamp}</div>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">Löschen</button>
                    </div>`;
                logList.appendChild(li);
            });
        };
    }

    function deleteItem(id) {
        if(confirm("Diesen Eintrag wirklich löschen?")) {
            const tx = db.transaction(["messungen"], "readwrite");
            tx.objectStore("messungen").delete(id);
            tx.oncomplete = () => {
                if (editingId === id) resetForm();
                updateApp();
            };
        }
    }

    function changePeriod(period) {
        currentPeriod = period;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${period}`).classList.add('active');
        updateChart();
    }

    function updateChart() {
        const tx = db.transaction(["messungen"], "readonly");
        tx.objectStore("messungen").getAll().onsuccess = (e) => {
            let data = e.target.result.sort((a,b) => a.rawDate - b.rawDate);
            const jetzt = new Date().getTime();
            
            if (currentPeriod === 'woche') {
                data = data.filter(i => (jetzt - i.rawDate) <= 7 * 24 * 60 * 60 * 1000);
            } else if (currentPeriod === 'monat') {
                data = data.filter(i => (jetzt - i.rawDate) <= 30 * 24 * 60 * 60 * 1000);
            }

            const labels = data.map(i => i.timestamp.split(',')[0]);
            const sysValues = data.map(i => i.sys);
            const diaValues = data.map(i => i.dia);

            if (myChart) myChart.destroy();

            const ctx = document.getElementById('bpChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Sys', data: sysValues, borderColor: '#ff4757', tension: 0.2, fill: false },
                        { label: 'Dia', data: diaValues, borderColor: '#5352ed', tension: 0.2, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { min: 40, max: 200 } },
                    plugins: { legend: { position: 'top' } }
                }
            });
        };
    }

    function calculateTrend() {
        const tx = db.transaction(["messungen"], "readonly");
        tx.objectStore("messungen").getAll().onsuccess = (e) => {
            const data = e.target.result;
            if (data.length < 2) {
                document.getElementById('trendDisplay').innerText = "Trend: Mehr Messungen benötigt";
                return;
            }

            const jetzt = new Date();
            const aktuelleMinuten = jetzt.getHours() * 60 + jetzt.getMinutes();

            let passendeMessungen = data.filter(item => {
                const messungMinuten = item.hour * 60 + item.minute;
                let diff = Math.abs(aktuelleMinuten - messungMinuten);
                return diff <= 60 || diff >= (24 * 60 - 60); 
            });

            passendeMessungen.sort((a,b) => b.rawDate - a.rawDate);
            const relevante = passendeMessungen.slice(0, 3);

            if (relevante.length < 2) {
                document.getElementById('trendDisplay').innerText = "Trend: Keine vergleichbare Uhrzeit im Verlauf";
                return;
            }

            let sysTrend = "";
            if (relevante.length >= 2) {
                const aktuell = relevante[0].sys;
                const vorher = relevante[1].sys;
                
                if (aktuell > vorher + 4) sysTrend = "⬆️ steigend";
                else if (aktuell < vorher - 4) sysTrend = "⬇️ sinkend";
                else sysTrend = "➡️ stabil";
            }

            document.getElementById('trendDisplay').innerText = `Trend (um ca. ${jetzt.getHours()}:${String(jetzt.getMinutes()).padStart(2,'0')} Uhr): ${sysTrend}`;
        };
    }

    function exportToCSV() {
        const tx = db.transaction(["messungen"], "readonly");
        tx.objectStore("messungen").getAll().onsuccess = (e) => {
            const data = e.target.result.sort((a,b) => a.rawDate - b.rawDate);
            if (data.length === 0) { alert("Keine Daten vorhanden!"); return; }

            let csv = "Datum & Uhrzeit;Systolisch (Oben);Diastolisch (Unten);Puls (bpm);Pille\r\n";
            data.forEach(i => {
                csv += `"${i.timestamp}";${i.sys};${i.dia};${i.pulse};${i.pille}\r\n`;
            });

            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = "blutdruck_pro_export.csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    }
</script>
</body>
</html>
